<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Prediction History</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #fff;
      min-height: 100vh;
    }

    .navbar {
      backdrop-filter: blur(10px);
    }

    .history-card {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(12px);
      border-radius: 18px;
      padding: 15px;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
    }

    .history-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 35px rgba(0,0,0,0.45);
    }

    .history-card img {
      border-radius: 12px;
      height: 180px;
      width: 100%;
      object-fit: cover;
    }

    .confidence-bar {
      height: 10px;
      border-radius: 10px;
      background: rgba(255,255,255,0.2);
      overflow: hidden;
      margin-top: 6px;
    }

    .confidence-fill {
      height: 100%;
      background: linear-gradient(90deg, #00c6ff, #0072ff);
    }

    .badge-ai {
      background: linear-gradient(90deg, #ff512f, #dd2476);
    }
  </style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark px-4">
  <a class="navbar-brand fw-bold" href="/">🧠 Brain Tumor AI</a>
  <a href="/" class="btn btn-outline-light btn-sm">⬅ Back to Home</a>
</nav>

<div class="container mt-4">
  <h2 class="text-center mb-4">📜 Prediction History</h2>

  {% if history %}
  <div class="row g-4">
    {% for item in history %}
    <div class="col-md-4 col-sm-6">
      <div class="history-card">
        <img src="{{ item.image }}" alt="MRI Image">

        <div class="mt-3">
          <span class="badge badge-ai mb-2">{{ item.result }}</span>
        <p class = "mb-1 mt-2" >
            confidence: <strong>{{ item.confidence }}</strong>

        </p>
           {% set conf = item.confidence.replace('%','') %}
<div class="confidence-bar">
  <div class="confidence-fill" data-width="{{ conf }}"></div>
</div>



          <small class="text-light d-block mt-2">
            🕒 {{ item.time }}
          </small>
        </div>
      </div>
    </div>
    {% endfor %}
  </div>
  {% else %}
    <p class="text-center mt-5">No predictions yet.</p>
  {% endif %}
</div>

<script>
  document.querySelectorAll(".confidence-fill").forEach(bar => {
    const width = bar.getAttribute("data-width");
    bar.style.width = width + "%";
  });
</script>


</body>
</html>
